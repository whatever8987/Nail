        content:
          type: string
        excerpt:
          type: string
          nullable: true
          description: A short summary of the post (optional)
        cover_image:
          type: string
          format: uri
          nullable: true
          description: URL of the main image for the post
          maxLength: 500
        author:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        category:
          $ref: '#/components/schemas/CategoryEnum'
        tags:
          description: List of tags, e.g., ['manicure', 'trends']
        published:
          type: boolean
          description: Check this to make the post visible to the public
